services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  ml-service:
    build:
      context: ./ml-service
    restart: unless-stopped
    environment:
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5000}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/ready', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ./server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/stockbreakers
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in your root .env before starting production containers}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      ML_SERVICE_URL: http://ml-service:8000
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-250}
      TRUST_PROXY: ${TRUST_PROXY:-false}
      MARKET_CLOCK_ENABLED: ${MARKET_CLOCK_ENABLED:-true}
      MARKET_DEMO_ALWAYS_OPEN: ${MARKET_DEMO_ALWAYS_OPEN:-false}
      SIM_MINUTES_PER_TICK: ${SIM_MINUTES_PER_TICK:-5}
      AFTER_HOURS_MINUTES_PER_TICK: ${AFTER_HOURS_MINUTES_PER_TICK:-30}
      MARKET_TICK_INTERVAL_MS: ${MARKET_TICK_INTERVAL_MS:-4000}
    depends_on:
      mongo:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:5000/api/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-}
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "3000:80"

volumes:
  mongo-data:
